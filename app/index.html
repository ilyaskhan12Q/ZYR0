<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Zyro — Internship Management Platform for Students & Companies</title>
    <meta name="title" content="Zyro — Internship Management Platform for Students & Companies" />
    <meta name="description" content="Zyro connects students with real internship opportunities, experienced mentors, and blockchain-verified digital certificates. Manage your entire internship lifecycle in one platform." />
    <meta name="keywords" content="internship platform, internship management, student internship, digital certificate, mentor, career portal, verified internship, job portal" />
    <meta name="author" content="Zyro" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1e293b" media="(prefers-color-scheme: dark)" />

    <!-- Canonical -->
    <link rel="canonical" href="%VITE_SITE_URL%/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Zyro" />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:title" content="Zyro — Internship Management Platform" />
    <meta property="og:description" content="Connect with real internship opportunities, experienced mentors, and earn blockchain-verified certificates. Your complete career launchpad." />
    <meta property="og:image" content="%VITE_SITE_URL%/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Zyro — Internship Management Platform" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@zyroplatform" />
    <meta name="twitter:creator" content="@zyroplatform" />
    <meta name="twitter:title" content="Zyro — Internship Management Platform" />
    <meta name="twitter:description" content="Connect with real internship opportunities, experienced mentors, and earn blockchain-verified certificates." />
    <meta name="twitter:image" content="%VITE_SITE_URL%/og-image.png" />
    <meta name="twitter:image:alt" content="Zyro platform preview" />

    <!-- Favicon & App Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/zyro-logo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/zyro-logo.png" />
    <link rel="apple-touch-icon" href="/zyro-logo.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://ui-avatars.com" />
    <link rel="dns-prefetch" href="https://i.pravatar.cc" />

    <!-- Organization Structured Data (global baseline) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Zyro",
      "url": "%VITE_SITE_URL%",
      "logo": "%VITE_SITE_URL%/zyro-logo.png",
      "description": "Zyro is a modern internship management platform connecting students, companies, and mentors for structured, verifiable internship experiences.",
      "sameAs": [
        "https://github.com/ilyaskhan12Q/ZYR0",
        "https://linkedin.com/company/zyro-platform"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "support@zyro.com",
        "contactType": "customer support",
        "availableLanguage": "English"
      }
    }
    </script>

    <!-- WebSite Structured Data with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Zyro",
      "url": "%VITE_SITE_URL%",
      "description": "Internship management platform for students, companies, and mentors.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "%VITE_SITE_URL%/internships?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
