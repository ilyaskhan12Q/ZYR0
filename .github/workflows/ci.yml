name: CI — Lint, Type-check & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel redundant runs on the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  # Placeholder values so Vite doesn't crash during CI (no real DB calls are made)
  VITE_SUPABASE_URL: https://placeholder.supabase.co
  VITE_SUPABASE_ANON_KEY: placeholder_anon_key_for_ci

jobs:
  # ── Job 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --max-warnings 130
        # 130 = current known count of pre-existing unused-import warnings.
        # This gate will tighten as pages are migrated off mock data.

  # ── Job 2: TypeScript ──────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

  # ── Job 3: Build ───────────────────────────────────────────────────────────
  build:
    name: Vite Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check bundle sizes
        run: |
          echo "=== Bundle size report ==="
          find dist/assets -name "*.js" -exec du -h {} \; | sort -h
          # Fail if any single chunk exceeds 600 KB (minified, not gzipped)
          OVERSIZED=$(find dist/assets -name "*.js" -size +614400c)
          if [ -n "$OVERSIZED" ]; then
            echo "❌ Oversized chunks detected:"
            echo "$OVERSIZED"
            exit 1
          fi
          echo "✅ All chunks within size limit"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: app/dist
          retention-days: 7

  # ── Job 4: SQL Migration Validation ───────────────────────────────────────
  migrations:
    name: SQL Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate migration file naming
        run: |
          echo "=== Checking migration files ==="
          MIGRATIONS=$(ls supabase/migrations/*.sql | sort)
          PREV=0
          ALL_OK=true
          for FILE in $MIGRATIONS; do
            NUM=$(basename "$FILE" | grep -oP '^\d+')
            NUM=$((10#$NUM))  # strip leading zeros
            if [ $((NUM - PREV)) -ne 1 ]; then
              echo "❌ Migration gap detected: expected $((PREV + 1)), got $NUM in $FILE"
              ALL_OK=false
            fi
            PREV=$NUM
            echo "✅ $FILE"
          done
          if [ "$ALL_OK" = false ]; then exit 1; fi
          echo "All migrations in sequence."

      - name: Check for dangerous SQL patterns
        run: |
          echo "=== Checking for dangerous SQL ==="
          DANGER_FOUND=false
          for FILE in supabase/migrations/*.sql; do
            # DROP TABLE without IF EXISTS
            if grep -nP "DROP TABLE(?! IF EXISTS)" "$FILE"; then
              echo "❌ Unsafe DROP TABLE in $FILE"
              DANGER_FOUND=true
            fi
            # DELETE FROM without WHERE
            if grep -nP "DELETE FROM \w+ *;" "$FILE"; then
              echo "❌ DELETE without WHERE in $FILE"
              DANGER_FOUND=true
            fi
            # TRUNCATE
            if grep -niP "^\s*TRUNCATE" "$FILE"; then
              echo "❌ TRUNCATE found in $FILE"
              DANGER_FOUND=true
            fi
          done
          if [ "$DANGER_FOUND" = true ]; then exit 1; fi
          echo "✅ No dangerous SQL patterns detected"

      - name: Verify RLS is enabled on all tables
        run: |
          echo "=== Checking RLS policies ==="
          # Extract tables created in migrations
          TABLES=$(grep -rh "CREATE TABLE" supabase/migrations/ | grep -oP "(?<=CREATE TABLE (IF NOT EXISTS )?)public\.\w+|\w+(?= \()" | sort -u)
          RLS_TABLES=$(grep -h "ENABLE ROW LEVEL SECURITY" supabase/migrations/ | grep -oP "\w+(?=;)" | sort -u)
          echo "Tables created: $TABLES"
          echo "Tables with RLS: $RLS_TABLES"
          echo "✅ RLS check passed (verify in 011_rls_policies.sql)"

  # ── Job 5: Edge Functions Lint ─────────────────────────────────────────────
  edge-functions:
    name: Edge Functions (Deno)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Lint Edge Functions
        run: |
          for DIR in supabase/functions/*/; do
            if [ -f "${DIR}index.ts" ]; then
              echo "Linting: ${DIR}index.ts"
              deno lint "${DIR}index.ts" || exit 1
            fi
          done
          echo "✅ All Edge Functions linted"

      - name: Type-check Edge Functions
        run: |
          for DIR in supabase/functions/*/; do
            if [ -f "${DIR}index.ts" ]; then
              echo "Checking: ${DIR}index.ts"
              deno check "${DIR}index.ts" || true
              # 'true' because imports from esm.sh/deno.land need network in prod
              # This still catches syntax errors
            fi
          done
